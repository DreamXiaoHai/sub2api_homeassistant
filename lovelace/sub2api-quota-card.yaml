# Requires "button-card" from HACS.
# Replace the six entity IDs below with the IDs from Developer Tools > States.
type: custom:button-card
entity: '[[[ return variables.daily_used; ]]]'
variables:
  daily_used: sensor.codex_subscription_daily_used
  daily_limit: sensor.codex_subscription_daily_limit
  daily_reset: sensor.codex_subscription_daily_reset
  weekly_used: sensor.codex_subscription_weekly_used
  weekly_limit: sensor.codex_subscription_weekly_limit
  weekly_reset: sensor.codex_subscription_weekly_reset
  fallback_title: Codex Subscription
triggers_update:
  - '[[[ return variables.daily_used; ]]]'
  - '[[[ return variables.daily_limit; ]]]'
  - '[[[ return variables.daily_reset; ]]]'
  - '[[[ return variables.weekly_used; ]]]'
  - '[[[ return variables.weekly_limit; ]]]'
  - '[[[ return variables.weekly_reset; ]]]'
show_icon: false
show_name: false
show_state: false
tap_action:
  action: none
hold_action:
  action: none
styles:
  card:
    - padding: 0
    - overflow: hidden
    - background: var(--ha-card-background, var(--card-background-color))
    - border: 1px solid var(--divider-color)
    - border-radius: 8px
    - box-shadow: var(--ha-card-box-shadow, none)
  grid:
    - grid-template-areas: '"content"'
    - grid-template-columns: 1fr
    - grid-template-rows: auto
  custom_fields:
    content:
      - width: 100%
      - min-width: 0
custom_fields:
  content: |
    [[[
      const getState = (entityId) => states[entityId];
      const getNumber = (entityId) => {
        const raw = getState(entityId)?.state;
        if (raw === undefined || raw === 'unknown' || raw === 'unavailable') {
          return null;
        }
        const value = Number(raw);
        return Number.isFinite(value) ? value : null;
      };
      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
      const money = (value) => value === null ? '--' : value.toFixed(2);
      const formatReset = (entityId) => {
        const raw = getState(entityId)?.state;
        if (!raw || raw === 'unknown' || raw === 'unavailable') {
          return '重置时间暂不可用';
        }
        const resetAt = Date.parse(raw);
        if (!Number.isFinite(resetAt)) {
          return '重置时间暂不可用';
        }
        const totalMinutes = Math.max(0, Math.floor((resetAt - Date.now()) / 60000));
        const days = Math.floor(totalMinutes / 1440);
        const hours = Math.floor((totalMinutes % 1440) / 60);
        const minutes = totalMinutes % 60;
        if (days > 0) return `${days}d ${hours}h 后重置`;
        if (hours > 0) return `${hours}h ${minutes}m 后重置`;
        if (minutes > 0) return `${minutes}m 后重置`;
        return '即将重置';
      };
      const quotaRow = (label, usedId, limitId, resetId) => {
        const used = getNumber(usedId);
        const limit = getNumber(limitId);
        const percentage = used !== null && limit !== null && limit > 0
          ? Math.min(Math.max((used / limit) * 100, 0), 100)
          : 0;
        const color = percentage >= 90
          ? '#ef4444'
          : percentage >= 70
            ? '#f59e0b'
            : '#22c55e';
        return `
          <div style="display:grid;gap:8px;min-width:0;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;">
              <span style="font-size:15px;font-weight:600;color:var(--primary-text-color);">${label}</span>
              <span style="font-size:14px;color:var(--secondary-text-color);white-space:nowrap;">$${money(used)} / $${money(limit)}</span>
            </div>
            <div style="height:10px;overflow:hidden;border-radius:5px;background:var(--divider-color);">
              <div style="height:100%;width:${percentage.toFixed(2)}%;border-radius:5px;background:${color};transition:width 300ms ease;"></div>
            </div>
            <div style="font-size:13px;color:var(--secondary-text-color);">${formatReset(resetId)}</div>
          </div>`;
      };

      const source = getState(variables.daily_used) ?? getState(variables.weekly_used);
      const attributes = source?.attributes ?? {};
      const title = escapeHtml(attributes.group_name || variables.fallback_title);
      const platformKey = String(attributes.platform || '').toLowerCase();
      const platformNames = {
        openai: 'OpenAI',
        anthropic: 'Anthropic',
        gemini: 'Gemini',
        antigravity: 'Antigravity',
        grok: 'Grok'
      };
      const platform = escapeHtml(platformNames[platformKey] || attributes.platform || 'sub2API');
      const active = String(attributes.status || 'active').toLowerCase() === 'active';
      const statusText = active ? '有效' : escapeHtml(attributes.status || '未知');
      const statusBackground = active ? '#0b4c3b' : '#4b2630';
      const statusColor = active ? '#6ee7b7' : '#fda4af';

      return `
        <div style="display:grid;min-width:0;font-family:var(--paper-font-body1_-_font-family);letter-spacing:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 22px;border-bottom:1px solid var(--divider-color);">
            <div style="display:flex;align-items:center;gap:12px;min-width:0;">
              <span style="width:8px;height:8px;flex:0 0 auto;border-radius:50%;background:#20c997;"></span>
              <div style="display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap;">
                <span style="font-size:19px;font-weight:700;color:var(--primary-text-color);overflow-wrap:anywhere;">${title}</span>
                <span style="padding:3px 9px;border:1px solid var(--primary-color);border-radius:5px;font-size:12px;color:var(--primary-color);background:color-mix(in srgb, var(--primary-color) 12%, transparent);">${platform}</span>
              </div>
            </div>
            <span style="flex:0 0 auto;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:600;color:${statusColor};background:${statusBackground};">${statusText}</span>
          </div>
          <div style="display:grid;gap:24px;padding:20px 22px 22px;">
            ${quotaRow('每日', variables.daily_used, variables.daily_limit, variables.daily_reset)}
            ${quotaRow('每周', variables.weekly_used, variables.weekly_limit, variables.weekly_reset)}
          </div>
        </div>`;
    ]]]
